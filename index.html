<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consultar Número - Google Apps Script</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!--
        Puedes personalizar el fondo colocando una imagen o GIF en el CSS.
        Ejemplo: en css/style.css, dentro de body { background: url('assets/tu-fondo.gif') center/cover no-repeat; }
        También puedes descomentar la línea <div class="background-gif"></div> más abajo y añadir
        un elemento con un GIF en assets/.
    -->
    

    <div class="container">
        <img src="assets/mosca.gif" alt="mosca" class="mosca-gif">
        <div class="header">
            <h1>Consulta</h1>
            <p>Ingresa tu Rut para obtener información</p>
        </div>

        <form id="formulario" class="form-consulta">
            <div class="form-group">
                <label for="numero">RUT a consultar:</label>
                <input 
                    type="number" 
                    id="numero" 
                    name="numero" 
                    placeholder="Ej: 12345678" 
                    required
                >
            </div>
            <div class="form-group">
                <label for="password">Contraseña:</label>
                <input 
                    type="password" 
                    id="password" 
                    name="password" 
                    placeholder="Tu contraseña" 
                >
            </div>
            
            <button type="submit" class="btn-primary">Consultar</button>
        </form>
        
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Cargando...</p>
        </div>
        
        <div id="resultado" class="resultado"></div>
    </div>

    <script src="js/script.js"></script>
    <!-- Reproductor de fondo: coloca assets/la-mosca-soyunamosca.mp3 -->
    <audio id="bg-audio" src="assets/la-mosca-soyunamosca.mp3" preload="auto"></audio>
    <script>
        (function(){
            const audio = document.getElementById('bg-audio');
            const targetVolume = 0.10; // volumen objetivo (0.0 - 1.0)
            const maxPlays = 1; // cuántas veces reproducir
            let playCount = 0;

            function fadeInAudio(duration = 1500){
                if(!audio) return;
                audio.volume = 0;
                const steps = 30;
                const stepTime = duration / steps;
                let currentStep = 0;
                const iv = setInterval(()=>{
                    currentStep++;
                    const v = Math.min(targetVolume, (currentStep/steps) * targetVolume);
                    audio.volume = v;
                    if(currentStep >= steps) clearInterval(iv);
                }, stepTime);
            }

            function handleEnded(){
                playCount++;
                if(playCount < maxPlays){
                    audio.currentTime = 0;
                    audio.play().catch(()=>{});
                } else {
                    // opcional: bajar volumen al finalizar la última repetición
                    audio.volume = 0;
                }
            }

            function tryPlay(){
                if(!audio) return;
                audio.removeAttribute('loop');
                audio.addEventListener('ended', handleEnded);
                audio.play().then(()=>{
                    fadeInAudio();
                }).catch(()=>{
                    // Autoplay bloqueado: reproducir en la primera interacción del usuario
                    document.addEventListener('click', onFirstInteraction, { once: true });
                    document.addEventListener('keydown', onFirstInteraction, { once: true });
                });
            }

            function onFirstInteraction(){
                if(!audio) return;
                audio.play().then(()=>{
                    fadeInAudio();
                }).catch(()=>{});
            }

            window.addEventListener('load', tryPlay);
        })();
    </script>
</body>
</html>
